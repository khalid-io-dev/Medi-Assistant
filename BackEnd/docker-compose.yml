networks:
  CliniQ_network:
    driver: bridge

# !::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::
volumes:
  postgres_data:
  qdrant_storage:
  ollama_storage:
  mlflow_db_data:
  grafana_data:
